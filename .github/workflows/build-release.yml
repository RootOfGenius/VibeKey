name: Build and release app

on:
  push:
    branches:
      - main
    paths:
      - "audition_chat_replace.py"
      - "app_metadata.json"
      - "assets/app_icon.ico"
      - ".github/workflows/build-release.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Read app metadata
        id: meta
        shell: python
        run: |
          import json
          import os
          from pathlib import Path

          metadata = json.loads(Path("app_metadata.json").read_text(encoding="utf-8"))
          app_version = metadata.get("version", "0.0.0")
          run_number = os.environ["GITHUB_RUN_NUMBER"]
          tag = f"v{app_version}-build.{run_number}"

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"app_version={app_version}\n")
              out.write(f"release_tag={tag}\n")
              out.write(f"release_name=VibeKey v{app_version} build {run_number}\n")

      - name: Install PyInstaller
        run: python -m pip install --upgrade pip pyinstaller

      - name: Build exe
        run: >
          pyinstaller
          --noconfirm
          --clean
          --windowed
          --onedir
          --name VibeKey
          --icon assets\app_icon.ico
          audition_chat_replace.py

      - name: Copy runtime data
        shell: pwsh
        run: |
          $dist = "dist\VibeKey"
          $items = @(
            "app_metadata.json",
            "audition_emoji_replace.json",
            "assets",
            "audition_stickers",
            "update_manifest.json"
          )

          foreach ($item in $items) {
            if (Test-Path $item) {
              Copy-Item $item $dist -Recurse -Force
            }
          }

          # Create an empty user custom mapping for first run.
          if (!(Test-Path "$dist\audition_emoji_custom.json")) {
            '{"label":"Tuy chinh","data":{}}' | Out-File "$dist\audition_emoji_custom.json" -Encoding utf8
          }

      - name: Package release zip
        shell: pwsh
        run: |
          $zip = "VibeKey-${{ steps.meta.outputs.app_version }}-windows.zip"
          if (Test-Path $zip) {
            Remove-Item $zip -Force
          }
          Compress-Archive -Path "dist\VibeKey\*" -DestinationPath $zip
          echo "RELEASE_ZIP=$zip" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VibeKey-windows
          path: ${{ env.RELEASE_ZIP }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.release_tag }}
          name: ${{ steps.meta.outputs.release_name }}
          files: ${{ env.RELEASE_ZIP }}
          prerelease: false
          make_latest: true
          body: |
            Automated VibeKey Windows build.

            App version: `${{ steps.meta.outputs.app_version }}`
            Commit: `${{ github.sha }}`
